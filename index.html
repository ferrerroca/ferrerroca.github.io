<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <meta
    name="description"
    content="Sastrería de autor en Salta. Confecciones exclusivas en lana de llama y vicuña, con diseño artesanal y terminaciones de alta costura."
  />

  <meta name="theme-color" content="#1a1a1a" />

  <!-- Open Graph -->
  <meta property="og:title" content="Sastrería de Autor | Alta Costura Andina" />
  <meta
    property="og:description"
    content="Vidriera de confecciones artesanales en barranca, lana de llama y vicuña."
  />

  <!-- IMPORTANTE -->
  <!-- Reemplazar por una imagen real -->
  <meta property="og:image" content="images/preview.jpg" />

  <meta property="og:type" content="website" />

  <title>Sastrería de Autor | Alta Costura Andina</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    :root {
      --bg: #f9f7f3;
      --surface: #ffffff;
      --text: #2a2a2a;
      --muted: #66625d;
      --dark: #181818;
      --gold: #c39a5a;
      --earth: #8b5e34;
      --line: #e7dfd3;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
      --radius: 24px;
      --header-height: 78px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    h1,
    h2,
    h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      line-height: 1.1;
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    /* HEADER */

    header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 1000;
      background: rgba(24, 24, 24, 0.84);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-inner {
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
      color: #fff;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .logo strong {
      font-size: 1rem;
    }

    .logo span {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.26em;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 24px;
      align-items: center;
    }

    nav a {
      color: rgba(255,255,255,0.86);
      transition: color 0.25s ease;
    }

    nav a:hover {
      color: #fff;
    }

    .nav-mobile {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #fff;
      cursor: pointer;
    }

    /* MOBILE MENU */

    .mobile-menu {
      position: fixed;
      top: calc(var(--header-height) + 10px);
      left: 16px;
      right: 16px;

      display: flex;
      flex-direction: column;
      gap: 10px;

      padding: 18px;

      border-radius: 24px;

      background: rgba(24,24,24,0.96);

      border: 1px solid rgba(255,255,255,0.08);

      backdrop-filter: blur(12px);

      transform: translateY(-20px);

      opacity: 0;
      pointer-events: none;

      transition: all 0.3s ease;

      z-index: 999;
    }

    .mobile-menu.active {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-menu a {
      padding: 14px 16px;
      border-radius: 16px;
      color: #fff;
      background: rgba(255,255,255,0.05);
      font-weight: 600;
    }

    /* HERO */

    .hero {
      min-height: 100vh;
      min-height: 100svh;

      padding-top: var(--header-height);

      display: grid;
      place-items: center;

      text-align: center;

      color: #fff;

      background:
        linear-gradient(rgba(0,0,0,0.58), rgba(0,0,0,0.42)),
        url('images/fondo-barracan.jpg') center/cover no-repeat;
    }

    .hero-content {
      width: min(900px, 100%);
      padding: 72px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;

      padding: 10px 16px;

      border-radius: 999px;

      background: rgba(255,255,255,0.08);

      border: 1px solid rgba(255,255,255,0.2);
    }

    .hero h1 {
      margin-top: 22px;
      font-size: clamp(2.8rem, 6vw, 5.2rem);
      color: #fff;
    }

    .hero p {
      margin: 20px auto 0;
      max-width: 760px;
      color: rgba(255,255,255,0.88);
    }

    .hero-actions {
      margin-top: 34px;

      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      gap: 10px;

      padding: 14px 24px;

      border-radius: 999px;

      font-weight: 700;

      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--gold);
      color: #fff;
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
    }

    /* SECTIONS */

    section {
      scroll-margin-top: 100px;
    }

    .section {
      padding: 96px 0;
    }

    .section-title {
      text-align: center;
      margin-bottom: 54px;
    }

    .section-title p {
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.78rem;
      color: var(--earth);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .section-title h2 {
      font-size: clamp(2rem, 4vw, 3.2rem);
    }

    /* GRID */

    .grid-galeria {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
    }

    .item-galeria {
      position: relative;
      overflow: hidden;

      border-radius: 28px;

      background: #fff;

      border: 1px solid var(--line);

      box-shadow: var(--shadow);
    }

    .item-galeria img {
      width: 100%;
      height: 470px;
      object-fit: cover;

      transition: transform 0.5s ease;
    }

    .item-galeria:hover img {
      transform: scale(1.05);
    }

    .overlay {
      position: absolute;

      left: 16px;
      right: 16px;
      bottom: 16px;

      padding: 18px;

      border-radius: 20px;

      background: rgba(255,255,255,0.95);

      transform: translateY(70%);

      transition: transform 0.35s ease;
    }

    .item-galeria:hover .overlay {
      transform: translateY(0);
    }

    /* CONTACT */

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .contact-panel,
    .contact-aside {
      padding: 34px;
      border-radius: 30px;
    }

    .contact-panel {
      background: var(--dark);
      color: #fff;
    }

    .contact-aside {
      background: #fff;
      border: 1px solid var(--line);
    }

    /* FLOAT BUTTON */

    .whatsapp-flotante {
      position: fixed;

      right: 22px;
      bottom: 22px;

      width: 58px;
      height: 58px;

      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      background: #25d366;

      color: #fff;

      font-size: 1.8rem;

      z-index: 1000;
    }

    /* RESPONSIVE */

    @media (max-width: 900px) {

      nav ul {
        display: none;
      }

      .nav-mobile {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .grid-galeria,
      .contact-grid {
        grid-template-columns: 1fr;
      }

      /* IMPORTANTE */
      /* Overlay visible siempre en mobile */

      .overlay {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;

        transform: none;

        border-radius: 0;
      }

      .item-galeria:hover .overlay {
        transform: none;
      }

      .section {
        padding: 72px 0;
      }
    }

    @media (max-width: 640px) {

      .hero-content {
        padding: 56px 0;
      }

      .hero p {
        font-size: 1rem;
      }

      .item-galeria img {
        height: 380px;
      }

      .contact-panel,
      .contact-aside {
        padding: 22px;
      }

      .whatsapp-flotante {
        width: 52px;
        height: 52px;
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="container header-inner">

      <a class="logo" href="#inicio">
        <strong>FERRER ROCA</strong>
        <span>Sastrería de Autor</span>
      </a>

      <nav aria-label="Navegación principal">
        <ul>
          <li><a href="#origen">Origen</a></li>
          <li><a href="#coleccion">Colección</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>
      </nav>

      <button
        class="nav-mobile"
        id="menu-toggle"
        aria-label="Abrir menú móvil"
        aria-expanded="false"
      >
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>

    <div class="mobile-menu" id="mobile-menu">
      <a href="#origen">Origen</a>
      <a href="#coleccion">Colección</a>
      <a href="#contacto">Contacto</a>
    </div>
  </header>

  <main>

    <section class="hero" id="inicio">

      <div class="container hero-content">

        <div class="eyebrow">
          <i class="fa-solid fa-seedling"></i>
          Confecciones en lana de llama y vicuña
        </div>

        <h1>Alta costura andina con identidad y oficio.</h1>

        <p>
          Diseños exclusivos confeccionados artesanalmente
          con materiales nobles y tradición andina.
        </p>

        <div class="hero-actions">
          <a class="btn btn-primary" href="#coleccion">
            <i class="fa-solid fa-gem"></i>
            Ver colección
          </a>

          <a class="btn btn-secondary" href="#contacto">
            <i class="fa-brands fa-whatsapp"></i>
            Consultar
          </a>
        </div>

      </div>

    </section>

  </main>

  <a
    class="whatsapp-flotante"
    href="https://wa.me/5493875028991"
    target="_blank"
    rel="noreferrer"
    aria-label="Abrir WhatsApp"
  >
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <script>

    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    function closeMenu() {
      mobileMenu.classList.remove('active');

      menuToggle.setAttribute('aria-expanded', 'false');

      const icon = menuToggle.querySelector('i');

      icon.classList.remove('fa-xmark');
      icon.classList.add('fa-bars');
    }

    function openMenu() {
      mobileMenu.classList.add('active');

      menuToggle.setAttribute('aria-expanded', 'true');

      const icon = menuToggle.querySelector('i');

      icon.classList.remove('fa-bars');
      icon.classList.add('fa-xmark');
    }

    menuToggle.addEventListener('click', () => {

      if (mobileMenu.classList.contains('active')) {
        closeMenu();
      } else {
        openMenu();
      }

    });

    document.querySelectorAll('.mobile-menu a').forEach(link => {

      link.addEventListener('click', () => {
        closeMenu();
      });

    });

    document.addEventListener('keydown', (e) => {

      if (e.key === 'Escape') {
        closeMenu();
      }

    });

    document.addEventListener('click', (e) => {

      const clickInside =
        mobileMenu.contains(e.target) ||
        menuToggle.contains(e.target);

      if (!clickInside) {
        closeMenu();
      }

    });

  </script>

</body>
</html>
